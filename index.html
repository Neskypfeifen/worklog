<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nesky WorkLog v2.0 - Urlopy</title>
    <style>
        :root {
            --bg: #121212; --card: #1e1e1e; --text: #eceff1; --accent: #bb86fc;
            --secondary: #9c27b0; --vacation: #03dac6; --error: #cf6679;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 500px; width: 100%; }
        .header { text-align: center; padding: 20px 0; }
        .header h1 { color: var(--accent); margin: 0; letter-spacing: 2px; text-transform: uppercase; font-size: 1.5rem; }
        
        .card { background: var(--card); border-radius: 15px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.4); margin-bottom: 20px; border: 1px solid rgba(187,134,252,0.1); }
        
        label { display: block; margin-bottom: 8px; font-size: 0.9rem; opacity: 0.8; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #333; background: #262626; color: white; font-size: 1rem; box-sizing: border-box; }
        
        .btn-group { display: flex; gap: 10px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 0.9rem; }
        .btn-save { background: var(--secondary); color: white; }
        .btn-vacation { background: transparent; color: var(--vacation); border: 2px solid var(--vacation); }
        button:active { transform: scale(0.95); opacity: 0.8; }

        .history-item { background: var(--card); padding: 15px; border-radius: 10px; margin-bottom: 10px; border-left: 5px solid var(--accent); display: flex; justify-content: space-between; align-items: center; animation: fadeIn 0.4s ease; }
        .item-vacation { border-left-color: var(--vacation); }
        .info b { display: block; color: var(--accent); }
        .info .v-text { color: var(--vacation); font-weight: bold; }
        .delete-btn { color: var(--error); background: none; border: none; font-size: 1.2rem; cursor: pointer; flex: 0; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .stats { font-size: 0.8rem; text-align: center; opacity: 0.6; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>Nesky WorkLog</h1>
            <p style="opacity:0.5; font-size:0.8rem;">Ewidencja Pracy i Urlopów</p>
        </div>

        <div class="card">
            <label>Data</label>
            <input type="date" id="workDate">
            
            <div id="workInputs">
                <label>Godziny (Start - Koniec)</label>
                <div style="display: flex; gap: 10px;">
                    <input type="time" id="startTime">
                    <input type="time" id="endTime">
                </div>
            </div>

            <div class="btn-group">
                <button class="btn-save" onclick="saveEntry('WORK')">ZAPISZ PRACĘ</button>
                <button class="btn-vacation" onclick="saveEntry('VACATION')">🌴 URLOP</button>
            </div>
        </div>

        <div id="historyList"></div>
        
        <div class="stats" id="statsArea"></div>
    </div>

    <script>
        // Ustawienie dzisiejszej daty na start
        document.getElementById('workDate').valueAsDate = new Date();

        function saveEntry(type) {
            const date = document.getElementById('workDate').value;
            if (!date) return alert("Wybierz datę!");

            let entry = {
                id: Date.now(),
                date: date,
                type: type
            };

            if (type === 'WORK') {
                const start = document.getElementById('startTime').value;
                const end = document.getElementById('endTime').value;
                if (!start || !end) return alert("Podaj godziny pracy!");
                entry.start = start;
                entry.end = end;
                entry.duration = calculateDuration(start, end);
            }

            let history = JSON.parse(localStorage.getItem('neskyLogs')) || [];
            history.unshift(entry);
            localStorage.setItem('neskyLogs', JSON.stringify(history));
            
            renderHistory();
        }

        function calculateDuration(start, end) {
            const s = start.split(':');
            const e = end.split(':');
            const startDate = new Date(0, 0, 0, s[0], s[1], 0);
            const endDate = new Date(0, 0, 0, e[0], e[1], 0);
            let diff = endDate.getTime() - startDate.getTime();
            if (diff < 0) diff += 24 * 60 * 60 * 1000;
            
            const hours = Math.floor(diff / 1000 / 60 / 60);
            const minutes = Math.floor((diff / 1000 / 60) % 60);
            return `${hours}h ${minutes}m`;
        }

        function renderHistory() {
            const history = JSON.parse(localStorage.getItem('neskyLogs')) || [];
            const list = document.getElementById('historyList');
            const stats = document.getElementById('statsArea');
            list.innerHTML = '';
            
            let totalWorkMinutes = 0;
            let vacationDays = 0;

            history.forEach(item => {
                const isVacation = item.type === 'VACATION';
                if(isVacation) vacationDays++;
                
                const div = document.createElement('div');
                div.className = `history-item ${isVacation ? 'item-vacation' : ''}`;
                
                div.innerHTML = `
                    <div class="info">
                        <b>${item.date}</b>
                        ${isVacation 
                            ? `<span class="v-text">🌴 DZIEŃ URLOPU</span>` 
                            : `<span>🕒 ${item.start} - ${item.end} (${item.duration})</span>`
                        }
                    </div>
                    <button class="delete-btn" onclick="deleteEntry(${item.id})">×</button>
                `;
                list.appendChild(div);
            });

            stats.innerHTML = `Zalogowano dni urlopu: ${vacationDays}`;
        }

        function deleteEntry(id) {
            let history = JSON.parse(localStorage.getItem('neskyLogs')) || [];
            history = history.filter(item => item.id !== id);
            localStorage.setItem('neskyLogs', JSON.stringify(history));
            renderHistory();
        }

        // Pierwsze ładowanie
        renderHistory();
    </script>
</body>
</html>
