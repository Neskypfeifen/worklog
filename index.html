<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nesky WorkLog v2.1</title>
    <style>
        :root {
            --bg: #121212; --card: #1e1e1e; --text: #eceff1; --accent: #bb86fc;
            --secondary: #9c27b0; --vacation: #03dac6; --error: #cf6679;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 500px; width: 100%; }
        .header { text-align: center; padding: 20px 0; }
        .header h1 { color: var(--accent); margin: 0; letter-spacing: 2px; text-transform: uppercase; font-size: 1.5rem; }
        
        .card { background: var(--card); border-radius: 15px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.4); margin-bottom: 20px; border: 1px solid rgba(187,134,252,0.1); }
        
        label { display: block; margin-bottom: 8px; font-size: 0.9rem; opacity: 0.8; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #333; background: #262626; color: white; font-size: 1rem; box-sizing: border-box; }
        
        .btn-group { display: flex; gap: 10px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 0.9rem; }
        .btn-save { background: var(--secondary); color: white; }
        .btn-vacation { background: transparent; color: var(--vacation); border: 2px solid var(--vacation); }
        button:active { transform: scale(0.95); opacity: 0.8; }

        .history-item { background: var(--card); padding: 15px; border-radius: 10px; margin-bottom: 10px; border-left: 5px solid var(--accent); display: flex; justify-content: space-between; align-items: center; }
        .item-vacation { border-left-color: var(--vacation); }
        .info b { display: block; color: var(--accent); }
        .v-badge { color: var(--vacation); font-weight: bold; font-size: 0.9rem; }
        .delete-btn { color: var(--error); background: none; border: none; font-size: 1.5rem; cursor: pointer; padding: 0 10px; }

        .footer-stats { font-size: 0.8rem; text-align: center; opacity: 0.6; margin-top: 20px; padding: 10px; border-top: 1px solid #333; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>NESKY WORKLOG</h1>
            <p style="opacity:0.5; font-size:0.75rem;">Ewidencja Pracy i Urlopów</p>
        </div>

        <div class="card">
            <label>Data</label>
            <input type="date" id="workDate">
            
            <label>Godziny (Start - Koniec)</label>
            <div style="display: flex; gap: 10px; margin-bottom: 5px;">
                <input type="time" id="startTime">
                <input type="time" id="endTime">
            </div>

            <div class="btn-group" style="margin-top: 10px;">
                <button class="btn-save" onclick="addEntry('WORK')">ZAPISZ PRACĘ</button>
                <button class="btn-vacation" onclick="addEntry('VACATION')">🌴 URLOP</button>
            </div>
        </div>

        <div id="logHistory"></div>
        
        <div class="footer-stats" id="vacationSummary"></div>
    </div>

    <script>
        // Inicjalizacja daty
        document.getElementById('workDate').valueAsDate = new Date();

        function addEntry(type) {
            const date = document.getElementById('workDate').value;
            if (!date) return;

            let newRecord = { id: Date.now(), date: date, type: type };

            if (type === 'WORK') {
                const s = document.getElementById('startTime').value;
                const e = document.getElementById('endTime').value;
                if (!s || !e) { alert("Wpisz godziny!"); return; }
                newRecord.start = s;
                newRecord.end = e;
                newRecord.duration = calcTime(s, e);
            }

            let data = JSON.parse(localStorage.getItem('nesky_v2')) || [];
            data.unshift(newRecord);
            localStorage.setItem('nesky_v2', JSON.stringify(data));
            refresh();
        }

        function calcTime(s, e) {
            const t1 = new Date("01/01/2000 " + s);
            const t2 = new Date("01/01/2000 " + e);
            let diff = t2 - t1;
            if (diff < 0) diff += 86400000;
            const h = Math.floor(diff / 3600000);
            const m = Math.round((diff % 3600000) / 60000);
            return h + "h " + m + "m";
        }

        function refresh() {
            const data = JSON.parse(localStorage.getItem('nesky_v2')) || [];
            const list = document.getElementById('logHistory');
            list.innerHTML = '';
            let vCount = 0;

            data.forEach(entry => {
                const isV = entry.type === 'VACATION';
                if(isV) vCount++;
                
                const item = document.createElement('div');
                item.className = `history-item ${isV ? 'item-vacation' : ''}`;
                item.innerHTML = `
                    <div class="info">
                        <b>${entry.date}</b>
                        ${isV ? `<span class="v-badge">🌴 DZIEŃ URLOPU</span>` : `<span>🕒 ${entry.start} - ${entry.end} (${entry.duration})</span>`}
                    </div>
                    <button class="delete-btn" onclick="removeEntry(${entry.id})">×</button>
                `;
                list.appendChild(item);
            });

            document.getElementById('vacationSummary').innerHTML = `Suma dni urlopu: ${vCount}`;
        }

        function removeEntry(id) {
            let data = JSON.parse(localStorage.getItem('nesky_v2')) || [];
            data = data.filter(e => e.id !== id);
            localStorage.setItem('nesky_v2', JSON.stringify(data));
            refresh();
        }

        refresh();
    </script>
</body>
</html>
