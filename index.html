<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nesky WorkLog v2.4</title>
    <style>
        :root {
            --bg: #121212; --card: #1e1e1e; --text: #eceff1; --accent: #bb86fc;
            --secondary: #9c27b0; --vacation: #03dac6; --error: #cf6679;
        }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 500px; width: 100%; }
        
        .lang-bar { display: flex; justify-content: flex-end; gap: 10px; margin-bottom: 10px; }
        .lang-btn { background: none; border: 1px solid #333; color: #777; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 0.8rem; }
        .lang-btn.active { border-color: var(--accent); color: var(--accent); }

        .header { text-align: center; padding: 10px 0 20px 0; }
        .header h1 { color: var(--accent); margin: 0; text-transform: uppercase; font-size: 1.6rem; letter-spacing: 2px; }
        
        .card { background: var(--card); border-radius: 12px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); margin-bottom: 20px; }
        
        label { display: block; margin-bottom: 5px; font-size: 0.9rem; color: var(--accent); }
        input, textarea { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #333; background: #222; color: white; font-size: 1rem; box-sizing: border-box; font-family: sans-serif; }
        textarea { height: 60px; resize: none; }
        
        .btn-group { display: flex; gap: 10px; margin-bottom: 10px; }
        button { flex: 1; padding: 14px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 0.9rem; }
        .btn-save { background: var(--secondary); color: white; }
        .btn-vacation { background: transparent; color: var(--vacation); border: 2px solid var(--vacation); }
        
        .io-group { display: flex; gap: 10px; margin-top: 10px; border-top: 1px solid #333; padding-top: 15px; }
        .btn-io { background: #333; color: #bbb; padding: 8px; font-size: 0.75rem; flex: 1; }

        .history-item { background: var(--card); padding: 15px; border-radius: 10px; margin-bottom: 10px; border-left: 4px solid var(--accent); display: flex; justify-content: space-between; align-items: flex-start; }
        .item-vacation { border-left-color: var(--vacation); }
        .info { flex: 1; }
        .info b { color: var(--accent); display: block; margin-bottom: 2px; }
        .info .desc { display: block; font-size: 0.9rem; opacity: 0.8; margin-top: 5px; font-style: italic; color: #ccc; }
        .v-text { color: var(--vacation); font-weight: bold; font-size: 0.85rem; }
        .delete-btn { color: var(--error); background: none; border: none; font-size: 1.5rem; cursor: pointer; padding-left: 10px; }

        .footer-stats { margin-top: 20px; opacity: 0.5; font-size: 0.8rem; text-align: center; border-top: 1px solid #333; padding-top: 15px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="lang-bar">
            <button class="lang-btn" onclick="setLang('pl')">PL</button>
            <button class="lang-btn" onclick="setLang('de')">DE</button>
            <button class="lang-btn" onclick="setLang('en')">EN</button>
        </div>

        <div class="header">
            <h1>NESKY WORKLOG</h1>
            <p id="sub-title" style="opacity:0.5; font-size:0.75rem; margin-top:5px;"></p>
        </div>

        <div class="card">
            <label id="lbl-date"></label>
            <input type="date" id="workDate">
            
            <label id="lbl-time"></label>
            <div style="display: flex; gap: 10px;">
                <input type="time" id="startTime">
                <input type="time" id="endTime">
            </div>

            <label id="lbl-desc"></label>
            <textarea id="workDesc"></textarea>

            <div class="btn-group">
                <button class="btn-save" id="btn-work" onclick="handleEntry('WORK')"></button>
                <button class="btn-vacation" id="btn-vac" onclick="handleEntry('VACATION')"></button>
            </div>

            <div class="io-group">
                <button class="btn-io" onclick="exportData()">📤 EXPORT</button>
                <button class="btn-io" onclick="document.getElementById('importFile').click()">📥 IMPORT</button>
                <input type="file" id="importFile" style="display:none" onchange="importData(event)">
            </div>
        </div>

        <div id="logHistory"></div>
        <div class="footer-stats" id="statLine"></div>
    </div>

    <script>
        const i18n = {
            pl: { sub: "Ewidencja Pracy i Urlopów", date: "Data", time: "Czas pracy (Od - Do)", desc: "Opis wykonanej pracy", work: "ZAPISZ PRACĘ", vac: "🌴 URLOP", vacDay: "🌴 DZIEŃ URLOPU", stat: "Wykorzystany urlop: ", alert: "Podaj godziny!" },
            de: { sub: "Arbeits- und Urlaubsaufzeichnung", date: "Datum", time: "Arbeitszeit (Von - Bis)", desc: "Beschreibung der Arbeit", work: "SPEICHERN", vac: "🌴 URLAUB", vacDay: "🌴 URLAUBSTAG", stat: "Genutzter Urlaub: ", alert: "Stunden eingeben!" },
            en: { sub: "Work and Vacation Log", date: "Date", time: "Work Hours (From - To)", desc: "Work Description", work: "SAVE WORK", vac: "🌴 VACATION", vacDay: "🌴 VACATION DAY", stat: "Vacation used: ", alert: "Enter hours!" }
        };

        let currentLang = localStorage.getItem('nesky_lang') || 'pl';
        document.getElementById('workDate').valueAsDate = new Date();

        function setLang(l) {
            currentLang = l;
            localStorage.setItem('nesky_lang', l);
            render();
        }

        function handleEntry(type) {
            const date = document.getElementById('workDate').value;
            const desc = document.getElementById('workDesc').value;
            if(!date) return;
            let entry = { id: Date.now(), date, type, desc };

            if(type === 'WORK') {
                const s = document.getElementById('startTime').value;
                const e = document.getElementById('endTime').value;
                if(!s || !e) return alert(i18n[currentLang].alert);
                entry.s = s; entry.e = e;
                entry.dur = calcDur(s, e);
            }

            let history = JSON.parse(localStorage.getItem('nesky_logs_final')) || [];
            history.unshift(entry);
            localStorage.setItem('nesky_logs_final', JSON.stringify(history));
            
            // Czyść pola po zapisie
            document.getElementById('workDesc').value = '';
            render();
        }

        function calcDur(s, e) {
            const t1 = new Date("2000/01/01 " + s);
            const t2 = new Date("2000/01/01 " + e);
            let d = t2 - t1;
            if(d < 0) d += 86400000;
            const h = Math.floor(d/3600000);
            const m = Math.floor((d%3600000)/60000);
            return `${h}h ${m}m`;
        }

        function exportData() {
            const data = localStorage.getItem('nesky_logs_final');
            if(!data) return;
            const blob = new Blob([data], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `nesky_worklog_backup.json`;
            a.click();
        }

        function importData(e) {
            const file = e.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                try {
                    const imported = JSON.parse(event.target.result);
                    localStorage.setItem('nesky_logs_final', JSON.stringify(imported));
                    render();
                } catch(err) { alert("Błąd pliku!"); }
            };
            reader.readAsText(file);
        }

        function render() {
            const t = i18n[currentLang];
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.innerText.toLowerCase() === currentLang));
            document.getElementById('sub-title').innerText = t.sub;
            document.getElementById('lbl-date').innerText = t.date;
            document.getElementById('lbl-time').innerText = t.time;
            document.getElementById('lbl-desc').innerText = t.desc;
            document.getElementById('btn-work').innerText = t.work;
            document.getElementById('btn-vac').innerText = t.vac;

            const history = JSON.parse(localStorage.getItem('nesky_logs_final')) || [];
            const list = document.getElementById('logHistory');
            list.innerHTML = '';
            let vCount = 0;

            history.forEach(item => {
                const isV = item.type === 'VACATION';
                if(isV) vCount++;
                const div = document.createElement('div');
                div.className = `history-item ${isV ? 'item-vacation' : ''}`;
                div.innerHTML = `
                    <div class="info">
                        <b>${item.date}</b>
                        ${isV ? `<span class="v-text">${t.vacDay}</span>` : `<span>🕒 ${item.s} - ${item.e} (${item.dur})</span>`}
                        ${item.desc ? `<span class="desc">${item.desc}</span>` : ''}
                    </div>
                    <button class="delete-btn" onclick="del(${item.id})">×</button>
                `;
                list.appendChild(div);
            });
            document.getElementById('statLine').innerHTML = `${t.stat} ${vCount}`;
        }

        function del(id) {
            let history = JSON.parse(localStorage.getItem('nesky_logs_final')) || [];
            history = history.filter(x => x.id !== id);
            localStorage.setItem('nesky_logs_final', JSON.stringify(history));
            render();
        }

        render();
    </script>
</body>
</html>
